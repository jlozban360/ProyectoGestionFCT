services:
  postgres:
    image: postgres:15-alpine
    container_name: fct_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestion_fct
      POSTGRES_USER: fct_user
      POSTGRES_PASSWORD: fct_secure_202420252026
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fct_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fct_user -d gestion_fct"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fct_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fct_user:fct_secure_202420252026@postgres:5432/gestion_fct
      JWT_SECRET: nX7mK2pQvR9sL4wY8jF3hD6tA1cE5uB0
      JWT_EXPIRATION: 86400000
      PORT: 8080
    networks:
      - fct_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: fct_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3050:80"
    networks:
      - fct_network

volumes:
  postgres_data:

networks:
  fct_network:
    driver: bridge
