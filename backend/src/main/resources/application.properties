# Server
server.port=8080
server.servlet.context-path=/api

# Database (overridden by env vars in Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gestion_fct}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:fct_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:fct_secure_2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:fct-jwt-secret-key-local-dev-only-change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Actuator / Health
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.fct=INFO
logging.level.org.springframework.security=WARN
